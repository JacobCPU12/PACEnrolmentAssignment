{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <!-- Scaling for mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pace Academy Login</title>
    <!-- Link to CSS file -->
  <link rel="stylesheet" href="{% static 'pacapp/login.css' %}">
</head>

<body>
  <main class="page">
      <!-- Top page heading -->
    <h1 class="page-title">Pace Academy Login</h1>
      <!-- Login card container -->
    <section class="card">
      <div class="card-inner">
        <h2 class="card-title">Welcome Back</h2>
        <p class="card-subtitle">Please enter your details to sign in.</p>
         <!-- Login form -->
        <form method="POST" class="form">
          {% csrf_token %}
           <!-- Username field -->
          <label class="label" for="username">USERNAME</label>
            <!-- Input wrapper so icon + input can be placed in the same row -->
          <div class="input-wrap">
            <span class="icon" aria-hidden="true">
              <!-- Inline SVG icon (user icon) so icon can be styled with CSS -->
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor"
                  d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.42 0-8 2-8 4.5A1.5 1.5 0 0 0 5.5 20h13A1.5 1.5 0 0 0 20 18.5C20 16 16.42 14 12 14Z"/>
              </svg>
            </span>
            <input id="username" name="username" type="text" placeholder="Enter your username" required />
          </div>
          <!-- Password field -->
          <label class="label" for="password">PASSWORD</label>
          <div class="input-wrap">
            <span class="icon" aria-hidden="true">
              <!-- lock icon -->
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor"
                  d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2h-4Zm7 12H7v-8h10Z"/>
              </svg>
            </span>
            <input id="password" name="password" type="password" placeholder="Enter your password" required />
          </div>
          <!-- Submit button -->
          <button class="btn" type="submit">Sign In</button>
        </form>
          <div><p>Login details:</p><p>User name: <code>admin</code></p><p>Password: <code>password1</code></p></div>
      </div>
    </section>
  </main>
</body>
</html>
